<div class="card flex justify-center">
  <p-button label="Ajouter un nouvel utilisateur" (onClick)="showDialog()"></p-button>
</div>

<p-dialog
    header="Ajouter un nouvel utilisateur"
    [modal]="true"
    [visible]="visible()">
  <app-add-user (finished)="onUserAdded($event)"> </app-add-user>
  </p-dialog>

  <p-table [value]="datas()" [tableStyle]="{ 'min-width': '50rem' }">
    <ng-template #header>
      <tr>
        <th>id</th>
        <th>firstName</th>
        <th>lastName</th>
        <th>Quota</th>
      </tr>
    </ng-template>
    <ng-template #body let-user>
      <tr>
        <td><a [routerLink]="['/user-detail', user.id]">{{ user.id }}</a></td>
        <td>{{ user.firstName }}</td>
        <td>{{ user.lastName }}</td>
        <td>{{ user.quota }}</td>
      </tr>
    </ng-template>
  </p-table>
